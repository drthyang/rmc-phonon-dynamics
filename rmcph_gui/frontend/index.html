<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rmcph GUI — RMC Phonon Runner</title>
<link rel="stylesheet" href="css/style.css">

<!-- three.js is loaded on demand (Phase 2+). Pinned CDN via import map; can be
     vendored into js/lib/ later for offline use without touching import sites. -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <header id="app-header">
    <span class="brand">rmcph</span>
    <span class="sub">RMC Phonon Runner</span>
    <span id="backend-status" class="status">connecting…</span>
  </header>

  <main id="app-main">
    <!-- Phase 1+ views mount here. -->
    <section id="view-root">
      <p class="placeholder">
        Scaffold ready. Data-folder selection arrives in Phase 1.
      </p>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
