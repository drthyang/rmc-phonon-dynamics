name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build (project-subpath base for Pages)
        working-directory: web
        env:
          VITE_BASE: /rmc-phonon-dynamics/
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Prune superseded deployments
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const all = await github.paginate(github.rest.repos.listDeployments, { owner, repo, per_page: 100 });
            all.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const stale = all.slice(1); // keep only the most recent (current) deployment
            core.info(`Found ${all.length} deployments; pruning ${stale.length}.`);
            for (const d of stale) {
              try {
                await github.rest.repos.createDeploymentStatus({ owner, repo, deployment_id: d.id, state: 'inactive' });
                await github.rest.repos.deleteDeployment({ owner, repo, deployment_id: d.id });
              } catch (e) {
                core.warning(`Could not delete deployment ${d.id}: ${e.message}`);
              }
            }
